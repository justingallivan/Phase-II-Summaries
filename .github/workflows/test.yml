name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:api-routes
      - run: npm run check:atlas
      - run: npm run check:atlas:self-test
      - run: npm run check:doc-currency
      - run: npm run check:doc-currency:self-test
      - run: npm run test:ci
